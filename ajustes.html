<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }
        button { 
            display: block; width: 100%; padding: 15px; margin-bottom: 10px;
            background: #222; border: 1px solid #444; color: #fff; 
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #333; }
    </style>
</head>
<body>

    <h3>Configurações de Idioma</h3>
    
    <button onclick="definirIdioma(dicionarioPT)">Português (BR)</button>
    <button onclick="definirIdioma(dicionarioEN)">English (US)</button>
    <button onclick="definirIdioma(dicionarioES)">Español (ES)</button>

    <script>
        // Estrutura modular de dicionários
        const dicionarioPT = {
            "Settings": "Ajustes",
            "Browser": "GhostNet",
            "Files": "Arquivos",
            "Calculator": "Calculadora",
            "Ajustes": "Ajustes",
            "GhostNet": "GhostNet",
            "Arquivos": "Arquivos",
            "Calculadora": "Calculadora"
        };

        const dicionarioEN = {
            "Ajustes": "Settings",
            "GhostNet": "Browser",
            "Arquivos": "Files",
            "Calculadora": "Calculator"
        };

        const dicionarioES = {
            "Ajustes": "Ajustes",
            "GhostNet": "Navegador",
            "Arquivos": "Archivos",
            "Calculadora": "Calculadora"
        };

        // Função única que recebe o objeto de tradução escolhido
        function definirIdioma(dicionario) {
            for (let original in dicionario) {
                window.parent.postMessage({
                    type: 'RENAME_APP',
                    originalName: original, // Chave fixa para o Kernel buscar
                    newName: dicionario[original] // Valor novo para substituir
                }, '*');
            }
        }
    </script>
</body>
</html>
