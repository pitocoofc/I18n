<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }
        button { 
            display: block; width: 100%; padding: 15px; margin-bottom: 10px;
            background: #222; border: 1px solid #444; color: #fff; 
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #333; }
    </style>
</head>
<body>

    <h3>Configurações de Idioma</h3>
    
    <button onclick="definirIdioma(dicionarioPT)">Português (BR)</button>
    <button onclick="definirIdioma(dicionarioEN)">English (US)</button>
    <button onclick="definirIdioma(dicionarioES)">Español (ES)</button>

    <script>
        // Estrutura modular de dicionários
        const dicionarioPT = {
    "AJUSTES": "Ajustes",
    "GHOSTNET": "GhostNet",
    "ARQUIVOS": "Arquivos",
    "CALCULADORA": "Calculadora"
};

const dicionarioEN = {
    "AJUSTES": "Settings",
    "GHOSTNET": "Browser",
    "ARQUIVOS": "Files",
    "CALCULADORA": "Calculator"
};

function definirIdioma(dicionario) {
    for (let id in dicionario) {
        window.parent.postMessage({
            type: 'RENAME_APP',
            id: id,          // A Chave Mestra (ex: AJUSTES)
            newName: dicionario[id] // O nome que vai aparecer (ex: Settings)
        }, '*');
    }
}


        
    </script>
</body>
</html>
