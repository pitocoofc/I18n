<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }
        button { 
            display: block; width: 100%; padding: 15px; margin-bottom: 10px;
            background: #222; border: 1px solid #444; color: #fff; 
            border-radius: 10px; cursor: pointer;
        }
        button:active { background: #333; }
    </style>
</head>
<body>

    <h3>Configurações de Sistema</h3>
    
    <button onclick="aplicarTraducao()">Aplicar Tradução (PT -> EN)</button>
    
    <button onclick="reverterTraducao()">Remover Tradução (Reset)</button>

    <script>
        // Mapeamento original -> novo
        const dicionario = {
            "Ajustes": "Settings",
            "GhostNet": "Browser",
            "Arquivos": "Files",
            "Calculadora": "Calculator"
        };

        const originalNames = ["Ajustes", "GhostNet", "Arquivos", "Calculadora"];

        function aplicarTraducao() {
            for (let original in dicionario) {
                window.parent.postMessage({
                    type: 'RENAME_APP',
                    originalName: original,
                    newName: dicionario[original]
                }, '*');
            }
        }

        function reverterTraducao() {
            originalNames.forEach(name => {
                window.parent.postMessage({
                    type: 'RENAME_APP',
                    originalName: name, // O Kernel busca pelo nome que está na tela, 
                                        // então aqui o truque é reverter para o original
                    newName: name
                }, '*');
            });
        }
    </script>
</body>
</html>
